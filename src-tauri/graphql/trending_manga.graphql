query ($page: Int) {
  Page(page: $page, perPage: 50) {
    pageInfo {
      total
      perPage
      currentPage
      lastPage
      hasNextPage
    }
    media(type: MANGA, sort: TRENDING_DESC) {
      id
      title {
        romaji
        english
        native
        userPreferred
      }
      type
      format
      status
      description(asHtml: false)
      startDate {
        year
        month
        day
      }
      endDate {
        year
        month
        day
      }
      chapters
      volumes
      coverImage {
        large
        medium
        color
      }
      bannerImage
      genres
      synonyms
      averageScore
      popularity
      trending
      externalLinks {
        site
        url
      }
    }
  }
}
